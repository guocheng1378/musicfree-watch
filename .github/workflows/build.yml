name: Build MusicFree Watch RPK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install aiot-toolkit
        run: npm install -g aiot-toolkit

      - name: Prepare project structure
        run: |
          # aiot-toolkit requires source files in src/ directory
          mkdir -p src
          cp -r app.ux common pages manifest.json src/

      - name: Build RPK
        run: |
          aiot build --complete-feature

      - name: Upload RPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: musicfree-watch-rpk
          path: dist/*.rpk
          retention-days: 30
